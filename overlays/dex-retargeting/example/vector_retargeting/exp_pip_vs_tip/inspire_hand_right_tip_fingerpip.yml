retargeting:
  type: vector
  urdf_path: inspire_hand/inspire_hand_right.urdf

  # Ablation: add PIP targets for the 4 fingers only; thumb stays tip-only.
  # Isolates whether the (rough) thumb PIP mapping is what hurts full shadow-style B.
  target_joint_names: [ 'pinky_proximal_joint', 'ring_proximal_joint', 'middle_proximal_joint', 'index_proximal_joint',
                        'thumb_proximal_pitch_joint', 'thumb_proximal_yaw_joint' ]

  target_origin_link_names: [ "base", "base", "base", "base", "base",
                              "base", "base", "base", "base" ]
  target_task_link_names: [ "thumb_tip",  "index_tip", "middle_tip", "ring_tip", "pinky_tip",
                            "index_intermediate", "middle_intermediate", "ring_intermediate", "pinky_intermediate" ]
  scaling_factor: 1.15

  target_link_human_indices: [ [ 0, 0, 0, 0, 0, 0, 0, 0, 0 ],
                               [ 4, 8, 12, 16, 20, 6, 10, 14, 18 ] ]

  low_pass_alpha: 0.2
